name: Build Multi-Layout FIP — Netcore N60 Pro

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout твой форк
        uses: actions/checkout@v4

      - name: Устанавливаем зависимости
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev libelf-dev python3 git

      - name: Создаём multi-layout defconfig для Netcore N60 Pro
        run: |
          cp uboot-mtk-20250711/configs/mt7986_netcore_n60-pro_defconfig \
             uboot-mtk-20250711/configs/mt7986_netcore_n60-pro_multi_layout_defconfig
          echo "CONFIG_MEDIATEK_MULTI_MTD_LAYOUT=y" >> uboot-mtk-20250711/configs/mt7986_netcore_n60-pro_multi_layout_defconfig
          echo "✅ multi_layout_defconfig создан"

      - name: Собираем multi-layout FIP
        run: |
          chmod +x build.sh
          BOARD=netcore_n60-pro \
          VERSION=2025 \
          MULTI_LAYOUT=1 \
          SILENT=Y \
          ./build.sh

      - name: Скачиваем готовые файлы
        uses: actions/upload-artifact@v4
        with:
          name: netcore-n60-pro-multi-layout-fip
          path: |
            output/*
            output_gpt/*
          retention-days: 30
